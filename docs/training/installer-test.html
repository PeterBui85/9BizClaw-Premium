<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9BizClaw — Installer Certification Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --surface: #fff;
    --border: #e2e2e2;
    --text: #1a1a1a;
    --text-secondary: #666;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --correct: #16a34a;
    --correct-bg: #f0fdf4;
    --wrong: #dc2626;
    --wrong-bg: #fef2f2;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-secondary);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
  }

  .meta {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .meta span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .question-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .question-block.answered-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .question-block.answered-wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .question-number {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.15s;
    user-select: none;
  }

  .option:hover:not(.disabled) {
    border-color: var(--accent);
    background: #f0f4ff;
  }

  .option.disabled { cursor: default; opacity: 0.7; }
  .option.selected { border-color: var(--accent); background: #eff6ff; }
  .option.correct-answer { border-color: var(--correct); background: #dcfce7; font-weight: 500; }
  .option.wrong-answer { border-color: var(--wrong); background: #fee2e2; }

  .option input[type="radio"] {
    margin-top: 2px;
    accent-color: var(--accent);
    flex-shrink: 0;
  }

  .explanation {
    margin-top: 12px;
    padding: 10px 12px;
    background: #f8f9fa;
    border-radius: 6px;
    font-size: 13px;
    color: var(--text-secondary);
    display: none;
    line-height: 1.5;
  }

  .explanation.visible { display: block; }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 40px;
  }

  button {
    padding: 12px 32px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: #f5f5f5; }

  .result-banner {
    text-align: center;
    padding: 32px 24px;
    border-radius: var(--radius);
    margin-bottom: 32px;
    display: none;
  }

  .result-banner.visible { display: block; }

  .result-banner.pass {
    background: var(--correct-bg);
    border: 2px solid var(--correct);
  }

  .result-banner.fail {
    background: var(--wrong-bg);
    border: 2px solid var(--wrong);
  }

  .result-score {
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .result-banner.pass .result-score { color: var(--correct); }
  .result-banner.fail .result-score { color: var(--wrong); }

  .result-label {
    font-size: 18px;
    font-weight: 600;
    margin-top: 4px;
  }

  .result-detail {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 8px;
  }

  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    transition: width 0.3s;
    z-index: 100;
  }

  .timer-expired { color: var(--wrong); font-weight: 700; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .fail-hint {
    margin-top: 12px;
    padding: 10px 12px;
    background: #fef3c7;
    border-radius: 6px;
    font-size: 13px;
    color: #92400e;
    display: none;
    line-height: 1.5;
  }

  @media (max-width: 600px) {
    .container { padding: 24px 16px 60px; }
    .question-block { padding: 16px; }

</style>

// --- Anti-cheat: shuffle everything on each load ---

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let activeQuestions = [];
let optionMaps = [];
const answers = {};

function buildShuffledTest() {
  const shuffledIndices = shuffle(QUESTION_BANK.map((_, i) => i));
  activeQuestions = shuffledIndices.map(i => QUESTION_BANK[i]);
  optionMaps = [];

  activeQuestions.forEach((q, qi) => {
    const originalCorrect = q.correct;
    const indices = shuffle(q.options.map((_, i) => i));
    const newCorrect = indices.indexOf(originalCorrect);
    optionMaps.push({ indices, correctShuffled: newCorrect });
  });
}

// --- Timer ---

let timerSeconds = 600;
let timerInterval = null;
let timerExpired = false;

function startTimer() {
  timerSeconds = 600;
  timerExpired = false;
  const el = document.getElementById('timerDisplay');
  el.className = '';
  updateTimerDisplay();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 120 && timerSeconds > 0) {
      el.className = 'timer-warn';
    }
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerExpired = true;
      el.className = 'timer-expired';
      el.textContent = 'HẾT GIỜ';
      autoSubmitExpired();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  document.getElementById('timerDisplay').textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function autoSubmitExpired() {
  const total = activeQuestions.length;
  const answered = Object.keys(answers).length;
  if (answered < total) {
    for (let i = 0; i < total; i++) {
      if (answers[i] === undefined) answers[i] = -1;
    }
  }
  submitTest(true);
}

// --- Render ---

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = activeQuestions.map((q, qi) => {
    const map = optionMaps[qi];
    return `
    <div class="question-block" id="qblock-${qi}">
      <div class="question-number">Câu ${qi + 1} / ${activeQuestions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${map.indices.map((origIdx, displayIdx) => `
          <label class="option" id="opt-${qi}-${displayIdx}" onclick="selectOption(${qi}, ${displayIdx})">
            <input type="radio" name="q${qi}" value="${displayIdx}">
            <span>${q.options[origIdx]}</span>
          </label>
        `).join('')}
      </div>
      <div class="explanation" id="explain-${qi}">${q.explain}</div>
      <div class="fail-hint" id="hint-${qi}">Câu này sai. Đọc lại tài liệu trước khi làm lại.</div>
    </div>`;
  }).join('');
}

function selectOption(qi, displayIdx) {
  if (timerExpired) return;
  const block = document.getElementById(`qblock-${qi}`);
  if (block.classList.contains('answered-correct') || block.classList.contains('answered-wrong')) return;

  answers[qi] = displayIdx;

  optionMaps[qi].indices.forEach((_, j) => {
    document.getElementById(`opt-${qi}-${j}`).classList.remove('selected');
  });
  document.getElementById(`opt-${qi}-${displayIdx}`).classList.add('selected');
  document.querySelector(`#opt-${qi}-${displayIdx} input`).checked = true;
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).filter(k => answers[k] !== -1).length;
  const pct = (answered / activeQuestions.length) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

function submitTest(forced) {
  if (!forced) {
    const total = activeQuestions.length;
    const answered = Object.keys(answers).filter(k => answers[k] !== -1).length;
    if (answered < total) {
      alert(`Còn ${total - answered} câu chưa trả lời. Vui lòng trả lời hết trước khi nộp.`);
      return;
    }
  }

  if (timerInterval) clearInterval(timerInterval);

  let correct = 0;
  const total = activeQuestions.length;

  activeQuestions.forEach((q, qi) => {
    const block = document.getElementById(`qblock-${qi}`);
    const map = optionMaps[qi];
    const isCorrect = answers[qi] === map.correctShuffled;

    if (isCorrect) {
      correct++;
      block.classList.add('answered-correct');
      document.getElementById(`opt-${qi}-${answers[qi]}`).classList.add('correct-answer');
      document.getElementById(`explain-${qi}`).classList.add('visible');
    } else {
      block.classList.add('answered-wrong');
      if (answers[qi] >= 0) {
        document.getElementById(`opt-${qi}-${answers[qi]}`).classList.add('wrong-answer');
      }
      document.getElementById(`hint-${qi}`).classList.add('visible');
    }

    map.indices.forEach((_, j) => {
      document.getElementById(`opt-${qi}-${j}`).classList.add('disabled');
      const radio = document.querySelector(`#opt-${qi}-${j} input`);
      if (radio) radio.disabled = true;
    });
  });

  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 80;

  const banner = document.getElementById('resultBanner');
  banner.className = `result-banner visible ${passed ? 'pass' : 'fail'}`;
  document.getElementById('resultScore').textContent = `${correct}/${total}`;

  if (passed) {
    document.getElementById('resultLabel').textContent = 'ĐẠT — Đủ điều kiện cài đặt';
    document.getElementById('resultDetail').textContent = `${pct}% đúng. Bạn có thể tiến hành cài đặt cho khách hàng.`;
  } else {
    const timeUp = timerExpired ? ' (hết giờ)' : '';
    document.getElementById('resultLabel').textContent = 'CHƯA ĐẠT — Cần học lại' + timeUp;
    document.getElementById('resultDetail').textContent =
      `${pct}% đúng. Cần đạt tối thiểu 80% (12/15). Câu sai đánh dấu đỏ — đọc lại tài liệu rồi làm lại.`;
  }

  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('retryBtn').style.display = 'inline-block';
  banner.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function retryTest() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('resultBanner').className = 'result-banner';
  document.getElementById('submitBtn').style.display = 'inline-block';
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';

  buildShuffledTest();
  renderQuestions();
  startTimer();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// --- Init ---
buildShuffledTest();
renderQuestions();
startTimer();
</script>
